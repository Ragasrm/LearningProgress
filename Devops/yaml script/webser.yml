---
# This playbook will install and configure a web server on the appserver host.
- name: Web server by ansible playbook
  host: "appserver"
  become: true
  tasks:
    - name: update ubuntu
      apt:
        name: "*"
        state: present
    
    - name: install apache2 on appserver
      apt:
        name: apache2
        state: present
    - name: start apache2 service
      service:
        name: apache2
        state: started
        enabled: true
    - name: Remove default index.html
      file:
        path: /var/www/html/index.html
    - name: Create index.html
      copy:
        content: "<h1>Welcome to my web server</h1>"
        dest: /var/www/html/index.html